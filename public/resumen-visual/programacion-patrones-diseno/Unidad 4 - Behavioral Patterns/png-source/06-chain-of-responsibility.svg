
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Chain of Responsibility</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · request through handlers</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="80" y="420" width="230" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="80" y="420" width="230" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="80" y1="462" x2="310" y2="462" stroke="#6689a1" stroke-width="2"/>

        <text x="195" y="444" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="98" y="490" font-size="19" fill="#d8c0a4">+ send(request)</text>

    </g>

    <g>
      <rect x="500" y="200" width="340" height="158" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="500" y="200" width="340" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="500" y1="260" x2="840" y2="260" stroke="#6689a1" stroke-width="2"/>

        <text x="670" y="224" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;abstract&gt;&gt;</text>

        <text x="670" y="246" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Handler</text>


        <text x="518" y="288" font-size="19" fill="#d8c0a4">- next: Handler</text>

        <text x="518" y="312" font-size="19" fill="#d8c0a4">+ setNext()</text>

        <text x="518" y="336" font-size="19" fill="#d8c0a4">+ handle(request)</text>

    </g>

    <g>
      <rect x="430" y="620" width="320" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="430" y="620" width="320" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="430" y1="662" x2="750" y2="662" stroke="#6689a1" stroke-width="2"/>

        <text x="590" y="644" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteHandlerA</text>


        <text x="448" y="690" font-size="19" fill="#d8c0a4">+ handle(request)</text>

    </g>

    <g>
      <rect x="820" y="620" width="320" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="820" y="620" width="320" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="820" y1="662" x2="1140" y2="662" stroke="#6689a1" stroke-width="2"/>

        <text x="980" y="644" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteHandlerB</text>


        <text x="838" y="690" font-size="19" fill="#d8c0a4">+ handle(request)</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 310 460 L 500 300" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="405" y="372" text-anchor="middle" font-size="17" fill="#d8c0a4">request</text>
    </g>

    <g>
      <path d="M 840 300 L 500 300" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="670" y="292" text-anchor="middle" font-size="17" fill="#d8c0a4">next</text>
    </g>

    <g>
      <path d="M 590 620 L 630 374" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 980 620 L 710 374" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 750 690 L 820 690" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="785" y="682" text-anchor="middle" font-size="17" fill="#d8c0a4">passes if not handled</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
