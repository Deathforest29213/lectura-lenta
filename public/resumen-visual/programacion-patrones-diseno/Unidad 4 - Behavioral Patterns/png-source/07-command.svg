
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Command</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · action as an object</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="90" y="250" width="220" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="90" y="250" width="220" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="90" y1="292" x2="310" y2="292" stroke="#6689a1" stroke-width="2"/>

        <text x="200" y="274" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="108" y="320" font-size="19" fill="#d8c0a4">+ configure()</text>

    </g>

    <g>
      <rect x="410" y="250" width="260" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="410" y="250" width="260" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="410" y1="292" x2="670" y2="292" stroke="#6689a1" stroke-width="2"/>

        <text x="540" y="274" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Invoker</text>


        <text x="428" y="320" font-size="19" fill="#d8c0a4">- command</text>

        <text x="428" y="344" font-size="19" fill="#d8c0a4">+ executeCommand()</text>

    </g>

    <g>
      <rect x="790" y="170" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="790" y="170" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="790" y1="230" x2="1090" y2="230" stroke="#6689a1" stroke-width="2"/>

        <text x="940" y="194" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="940" y="216" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Command</text>


        <text x="808" y="258" font-size="19" fill="#d8c0a4">+ execute()</text>

    </g>

    <g>
      <rect x="790" y="570" width="330" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="790" y="570" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="790" y1="612" x2="1120" y2="612" stroke="#6689a1" stroke-width="2"/>

        <text x="955" y="594" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteCommand</text>


        <text x="808" y="640" font-size="19" fill="#d8c0a4">- receiver</text>

        <text x="808" y="664" font-size="19" fill="#d8c0a4">+ execute()</text>

    </g>

    <g>
      <rect x="1230" y="570" width="260" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1230" y="570" width="260" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1230" y1="612" x2="1490" y2="612" stroke="#6689a1" stroke-width="2"/>

        <text x="1360" y="594" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Receiver</text>


        <text x="1248" y="640" font-size="19" fill="#d8c0a4">+ action()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 310 310 L 410 310" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="360" y="302" text-anchor="middle" font-size="17" fill="#d8c0a4">sets</text>
    </g>

    <g>
      <path d="M 670 310 L 790 250" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="730" y="272" text-anchor="middle" font-size="17" fill="#d8c0a4">stores</text>
    </g>

    <g>
      <path d="M 955 570 L 940 292" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 1120 640 L 1230 640" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="1175" y="632" text-anchor="middle" font-size="17" fill="#d8c0a4">calls</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
