
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Mediator</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · coordinated communication</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="650" y="150" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="650" y="150" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="650" y1="210" x2="950" y2="210" stroke="#6689a1" stroke-width="2"/>

        <text x="800" y="174" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="800" y="196" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Mediator</text>


        <text x="668" y="238" font-size="19" fill="#d8c0a4">+ notify(sender, event)</text>

    </g>

    <g>
      <rect x="610" y="520" width="380" height="134" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="610" y="520" width="380" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="610" y1="562" x2="990" y2="562" stroke="#6689a1" stroke-width="2"/>

        <text x="800" y="544" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteMediator</text>


        <text x="628" y="590" font-size="19" fill="#d8c0a4">- colleagueA</text>

        <text x="628" y="614" font-size="19" fill="#d8c0a4">- colleagueB</text>

        <text x="628" y="638" font-size="19" fill="#d8c0a4">+ notify(sender, event)</text>

    </g>

    <g>
      <rect x="160" y="360" width="300" height="134" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="160" y="360" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="160" y1="420" x2="460" y2="420" stroke="#6689a1" stroke-width="2"/>

        <text x="310" y="384" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;abstract&gt;&gt;</text>

        <text x="310" y="406" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Colleague</text>


        <text x="178" y="448" font-size="19" fill="#d8c0a4">- mediator</text>

        <text x="178" y="472" font-size="19" fill="#d8c0a4">+ changed()</text>

    </g>

    <g>
      <rect x="120" y="720" width="260" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="120" y="720" width="260" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="120" y1="762" x2="380" y2="762" stroke="#6689a1" stroke-width="2"/>

        <text x="250" y="744" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ColleagueA</text>


        <text x="138" y="790" font-size="19" fill="#d8c0a4">+ actionA()</text>

    </g>

    <g>
      <rect x="420" y="720" width="260" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="420" y="720" width="260" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="420" y1="762" x2="680" y2="762" stroke="#6689a1" stroke-width="2"/>

        <text x="550" y="744" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ColleagueB</text>


        <text x="438" y="790" font-size="19" fill="#d8c0a4">+ actionB()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 800 520 L 800 272" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 460 430 L 610 610" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="535" y="512" text-anchor="middle" font-size="17" fill="#d8c0a4">talks through</text>
    </g>

    <g>
      <path d="M 250 720 L 285 482" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 550 720 L 335 482" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
