
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Template Method</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · fixed recipe variable steps</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">

    <g>
      <rect x="1060" y="330" width="320" height="150" rx="12" fill="rgba(178, 110, 99, 0.16)" stroke="#b26e63" stroke-width="2"/>

        <text x="1078" y="360" font-size="18" fill="#fcdebe">templateMethod fixes the order;</text>

        <text x="1078" y="384" font-size="18" fill="#fcdebe">subclasses fill selected steps.</text>

    </g>


    <g>
      <rect x="560" y="170" width="430" height="182" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="560" y="170" width="430" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="560" y1="230" x2="990" y2="230" stroke="#6689a1" stroke-width="2"/>

        <text x="775" y="194" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;abstract&gt;&gt;</text>

        <text x="775" y="216" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">AbstractClass</text>


        <text x="578" y="258" font-size="19" fill="#d8c0a4">+ templateMethod()</text>

        <text x="578" y="282" font-size="19" fill="#d8c0a4"># stepA()</text>

        <text x="578" y="306" font-size="19" fill="#d8c0a4"># stepB()</text>

        <text x="578" y="330" font-size="19" fill="#d8c0a4"># hook()</text>

    </g>

    <g>
      <rect x="590" y="610" width="370" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="590" y="610" width="370" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="590" y1="652" x2="960" y2="652" stroke="#6689a1" stroke-width="2"/>

        <text x="775" y="634" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteClass</text>


        <text x="608" y="680" font-size="19" fill="#d8c0a4"># stepA()</text>

        <text x="608" y="704" font-size="19" fill="#d8c0a4"># stepB()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 775 610 L 775 352" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
