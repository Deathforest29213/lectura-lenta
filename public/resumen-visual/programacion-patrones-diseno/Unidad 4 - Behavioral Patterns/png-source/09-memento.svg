
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Memento</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · snapshot and restore</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="230" y="290" width="330" height="134" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="230" y="290" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="230" y1="332" x2="560" y2="332" stroke="#6689a1" stroke-width="2"/>

        <text x="395" y="314" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Originator</text>


        <text x="248" y="360" font-size="19" fill="#d8c0a4">- state</text>

        <text x="248" y="384" font-size="19" fill="#d8c0a4">+ save(): Memento</text>

        <text x="248" y="408" font-size="19" fill="#d8c0a4">+ restore(memento)</text>

    </g>

    <g>
      <rect x="690" y="330" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="690" y="330" width="300" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="690" y1="372" x2="990" y2="372" stroke="#6689a1" stroke-width="2"/>

        <text x="840" y="354" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Memento</text>


        <text x="708" y="400" font-size="19" fill="#d8c0a4">- state</text>

        <text x="708" y="424" font-size="19" fill="#d8c0a4">+ getState()</text>

    </g>

    <g>
      <rect x="1120" y="290" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1120" y="290" width="300" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1120" y1="332" x2="1420" y2="332" stroke="#6689a1" stroke-width="2"/>

        <text x="1270" y="314" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Caretaker</text>


        <text x="1138" y="360" font-size="19" fill="#d8c0a4">- history[]</text>

        <text x="1138" y="384" font-size="19" fill="#d8c0a4">+ undo()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 560 380 L 690 400" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="625" y="382" text-anchor="middle" font-size="17" fill="#d8c0a4">creates</text>
    </g>

    <g>
      <path d="M 1120 380 L 990 400" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="1055" y="382" text-anchor="middle" font-size="17" fill="#d8c0a4">stores</text>
    </g>

    <g>
      <path d="M 690 455 L 560 455" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="625" y="447" text-anchor="middle" font-size="17" fill="#d8c0a4">restore</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
