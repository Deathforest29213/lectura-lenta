      <line x1="1030" y1="622" x2="1350" y2="622" stroke="#6689a1" stroke-width="2"/>

        <text x="1190" y="604" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteIterator</text>


