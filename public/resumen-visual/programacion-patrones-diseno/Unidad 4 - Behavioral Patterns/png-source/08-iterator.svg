        <text x="1180" y="206" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Iterator</text>


        <text x="1048" y="248" font-size="19" fill="#d8c0a4">+ next()</text>

        <text x="1048" y="272" font-size="19" fill="#d8c0a4">+ hasNext()</text>

