      <line x1="500" y1="622" x2="840" y2="622" stroke="#6689a1" stroke-width="2"/>

        <text x="670" y="604" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteAggregate</text>


        <text x="518" y="650" font-size="19" fill="#d8c0a4">- items</text>

        <text x="518" y="674" font-size="19" fill="#d8c0a4">+ createIterator()</text>

