
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Observer</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Behavioral pattern · automatic reaction to changes</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="210" y="210" width="330" height="158" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="210" y="210" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="210" y1="252" x2="540" y2="252" stroke="#6689a1" stroke-width="2"/>

        <text x="375" y="234" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Subject</text>


        <text x="228" y="280" font-size="19" fill="#d8c0a4">- observers[]</text>

        <text x="228" y="304" font-size="19" fill="#d8c0a4">+ attach()</text>

        <text x="228" y="328" font-size="19" fill="#d8c0a4">+ detach()</text>

        <text x="228" y="352" font-size="19" fill="#d8c0a4">+ notify()</text>

    </g>

    <g>
      <rect x="210" y="610" width="330" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="210" y="610" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="210" y1="652" x2="540" y2="652" stroke="#6689a1" stroke-width="2"/>

        <text x="375" y="634" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteSubject</text>


        <text x="228" y="680" font-size="19" fill="#d8c0a4">- state</text>

        <text x="228" y="704" font-size="19" fill="#d8c0a4">+ getState()</text>

    </g>

    <g>
      <rect x="910" y="210" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="910" y="210" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="910" y1="270" x2="1210" y2="270" stroke="#6689a1" stroke-width="2"/>

        <text x="1060" y="234" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="1060" y="256" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Observer</text>


        <text x="928" y="298" font-size="19" fill="#d8c0a4">+ update()</text>

    </g>

    <g>
      <rect x="910" y="610" width="330" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="910" y="610" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="910" y1="652" x2="1240" y2="652" stroke="#6689a1" stroke-width="2"/>

        <text x="1075" y="634" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteObserver</text>


        <text x="928" y="680" font-size="19" fill="#d8c0a4">+ update()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 375 610 L 375 382" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 540 300 L 910 300" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="725" y="292" text-anchor="middle" font-size="17" fill="#d8c0a4">notifies many</text>
    </g>

    <g>
      <path d="M 1075 610 L 1060 332" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 910 670 L 540 670" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="725" y="662" text-anchor="middle" font-size="17" fill="#d8c0a4">reads state</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
