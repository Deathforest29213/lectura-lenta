  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 310 270 L 470 250" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="390" y="252" text-anchor="middle" font-size="17" fill="#d8c0a4">uses</text>
    </g>

    <g>
      <path d="M 635 560 L 635 332" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#inherit)"/>

