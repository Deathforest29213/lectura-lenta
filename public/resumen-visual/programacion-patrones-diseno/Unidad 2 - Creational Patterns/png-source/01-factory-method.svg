  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Factory Method</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Creational pattern · concrete product creation</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="90" y="220" width="220" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="90" y="220" width="220" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="90" y1="262" x2="310" y2="262" stroke="#6689a1" stroke-width="2"/>

        <text x="200" y="244" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="108" y="290" font-size="19" fill="#d8c0a4">+ use(product)</text>

    </g>

    <g>
      <rect x="470" y="180" width="330" height="134" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="470" y="180" width="330" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="470" y1="240" x2="800" y2="240" stroke="#6689a1" stroke-width="2"/>

        <text x="635" y="204" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;abstract&gt;&gt;</text>

        <text x="635" y="226" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Creator</text>


        <text x="488" y="268" font-size="19" fill="#d8c0a4">+ operation()</text>

        <text x="488" y="292" font-size="19" fill="#d8c0a4">+ factoryMethod(): Product</text>

    </g>

    <g>
      <rect x="470" y="560" width="330" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="470" y="560" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="470" y1="602" x2="800" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="635" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteCreator</text>


        <text x="488" y="630" font-size="19" fill="#d8c0a4">+ factoryMethod(): Product</text>

    </g>

    <g>
      <rect x="1050" y="190" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1050" y="190" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1050" y1="250" x2="1350" y2="250" stroke="#6689a1" stroke-width="2"/>

        <text x="1200" y="214" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="1200" y="236" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Product</text>


        <text x="1068" y="278" font-size="19" fill="#d8c0a4">+ execute()</text>

    </g>

    <g>
      <rect x="1050" y="560" width="300" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1050" y="560" width="300" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1050" y1="602" x2="1350" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="1200" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteProduct</text>


        <text x="1068" y="630" font-size="19" fill="#d8c0a4">+ execute()</text>

    </g>

