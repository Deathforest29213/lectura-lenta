    <g>
      <path d="M 800 248 L 1050 248" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="925" y="240" text-anchor="middle" font-size="17" fill="#d8c0a4">creates</text>
    </g>

    <g>
      <path d="M 1200 560 L 1200 312" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

