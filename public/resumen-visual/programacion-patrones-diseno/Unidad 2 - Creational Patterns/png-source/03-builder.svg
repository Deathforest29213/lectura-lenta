
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Builder</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Creational pattern · step by step construction</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="90" y="430" width="220" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="90" y="430" width="220" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="90" y1="472" x2="310" y2="472" stroke="#6689a1" stroke-width="2"/>

        <text x="200" y="454" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="108" y="500" font-size="19" fill="#d8c0a4">+ configure()</text>

    </g>

    <g>
      <rect x="420" y="240" width="270" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="420" y="240" width="270" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="420" y1="282" x2="690" y2="282" stroke="#6689a1" stroke-width="2"/>

        <text x="555" y="264" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Director</text>


        <text x="438" y="310" font-size="19" fill="#d8c0a4">+ construct()</text>

    </g>

    <g>
      <rect x="820" y="160" width="330" height="158" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="820" y="160" width="330" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="820" y1="220" x2="1150" y2="220" stroke="#6689a1" stroke-width="2"/>

        <text x="985" y="184" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="985" y="206" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Builder</text>


        <text x="838" y="248" font-size="19" fill="#d8c0a4">+ buildPartA()</text>

        <text x="838" y="272" font-size="19" fill="#d8c0a4">+ buildPartB()</text>

        <text x="838" y="296" font-size="19" fill="#d8c0a4">+ getResult()</text>

    </g>

    <g>
      <rect x="820" y="560" width="330" height="158" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="820" y="560" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="820" y1="602" x2="1150" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="985" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteBuilder</text>


        <text x="838" y="630" font-size="19" fill="#d8c0a4">- product: Product</text>

        <text x="838" y="654" font-size="19" fill="#d8c0a4">+ buildPartA()</text>

        <text x="838" y="678" font-size="19" fill="#d8c0a4">+ buildPartB()</text>

        <text x="838" y="702" font-size="19" fill="#d8c0a4">+ getResult()</text>

    </g>

    <g>
      <rect x="1250" y="560" width="260" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1250" y="560" width="260" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1250" y1="602" x2="1510" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="1380" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Product</text>


        <text x="1268" y="630" font-size="19" fill="#d8c0a4">parts</text>

        <text x="1268" y="654" font-size="19" fill="#d8c0a4">+ use()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 310 470 L 420 310" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="365" y="382" text-anchor="middle" font-size="17" fill="#d8c0a4">selects</text>
    </g>

    <g>
      <path d="M 690 310 L 820 250" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="755" y="272" text-anchor="middle" font-size="17" fill="#d8c0a4">uses</text>
    </g>

    <g>
      <path d="M 985 560 L 985 330" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 1150 625 L 1250 625" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="1200" y="617" text-anchor="middle" font-size="17" fill="#d8c0a4">creates</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
