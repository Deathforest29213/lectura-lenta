
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Singleton</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Creational pattern · one shared instance</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">

    <g>
      <rect x="1160" y="375" width="290" height="116" rx="12" fill="rgba(178, 110, 99, 0.16)" stroke="#b26e63" stroke-width="2"/>

        <text x="1178" y="405" font-size="18" fill="#fcdebe">Constructor is hidden; access is</text>

        <text x="1178" y="429" font-size="18" fill="#fcdebe">controlled through getInstance().</text>

    </g>


    <g>
      <rect x="150" y="250" width="220" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="150" y="250" width="220" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="150" y1="292" x2="370" y2="292" stroke="#6689a1" stroke-width="2"/>

        <text x="260" y="274" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client A</text>


        <text x="168" y="320" font-size="19" fill="#d8c0a4">+ use()</text>

    </g>

    <g>
      <rect x="150" y="560" width="220" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="150" y="560" width="220" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="150" y1="602" x2="370" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="260" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client B</text>


        <text x="168" y="630" font-size="19" fill="#d8c0a4">+ use()</text>

    </g>

    <g>
      <rect x="680" y="300" width="420" height="158" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="680" y="300" width="420" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="680" y1="342" x2="1100" y2="342" stroke="#6689a1" stroke-width="2"/>

        <text x="890" y="324" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Singleton</text>


        <text x="698" y="370" font-size="19" fill="#d8c0a4">- static instance: Singleton</text>

        <text x="698" y="394" font-size="19" fill="#d8c0a4">- Singleton()</text>

        <text x="698" y="418" font-size="19" fill="#d8c0a4">+ static getInstance()</text>

        <text x="698" y="442" font-size="19" fill="#d8c0a4">+ operation()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 370 300 L 680 400" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="525" y="342" text-anchor="middle" font-size="17" fill="#d8c0a4">getInstance()</text>
    </g>

    <g>
      <path d="M 370 610 L 680 500" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="525" y="547" text-anchor="middle" font-size="17" fill="#d8c0a4">same instance</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
