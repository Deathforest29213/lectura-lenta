
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 11 5 L 0 10 z" fill="#d8c0a4"/>
    </marker>
    <marker id="inherit" markerWidth="18" markerHeight="18" refX="16" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 16 8 L 1 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="18" refX="2" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 8 L 9 1 L 16 8 L 9 15 z" fill="#2e343d" stroke="#d8c0a4" stroke-width="2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10141a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#2e343d"/>
  <rect x="38" y="38" width="1524" height="924" rx="34" fill="rgba(57, 64, 73, 0.68)" stroke="#6689a1" stroke-width="2"/>
  <text x="80" y="104" font-family="Nunito, Arial, sans-serif" font-size="42" font-weight="900" fill="#fcdebe">Flyweight</text>
  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Structural pattern · shared repeated state</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="100" y="440" width="240" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="100" y="440" width="240" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="100" y1="482" x2="340" y2="482" stroke="#6689a1" stroke-width="2"/>

        <text x="220" y="464" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="118" y="510" font-size="19" fill="#d8c0a4">+ drawMany()</text>

    </g>

    <g>
      <rect x="460" y="240" width="340" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="460" y="240" width="340" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="460" y1="282" x2="800" y2="282" stroke="#6689a1" stroke-width="2"/>

        <text x="630" y="264" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">FlyweightFactory</text>


        <text x="478" y="310" font-size="19" fill="#d8c0a4">- cache: Map</text>

        <text x="478" y="334" font-size="19" fill="#d8c0a4">+ getFlyweight(key)</text>

    </g>

    <g>
      <rect x="950" y="180" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="950" y="180" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="950" y1="240" x2="1250" y2="240" stroke="#6689a1" stroke-width="2"/>

        <text x="1100" y="204" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="1100" y="226" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Flyweight</text>


        <text x="968" y="268" font-size="19" fill="#d8c0a4">+ operation(extrinsic)</text>

    </g>

    <g>
      <rect x="950" y="560" width="330" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="950" y="560" width="330" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="950" y1="602" x2="1280" y2="602" stroke="#6689a1" stroke-width="2"/>

        <text x="1115" y="584" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">ConcreteFlyweight</text>


        <text x="968" y="630" font-size="19" fill="#d8c0a4">- intrinsicState</text>

        <text x="968" y="654" font-size="19" fill="#d8c0a4">+ operation(extrinsic)</text>

    </g>

    <g>
      <rect x="470" y="610" width="320" height="134" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="470" y="610" width="320" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="470" y1="652" x2="790" y2="652" stroke="#6689a1" stroke-width="2"/>

        <text x="630" y="634" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Context</text>


        <text x="488" y="680" font-size="19" fill="#d8c0a4">- extrinsicState</text>

        <text x="488" y="704" font-size="19" fill="#d8c0a4">- flyweight</text>

        <text x="488" y="728" font-size="19" fill="#d8c0a4">+ operation()</text>

    </g>

  </g>
  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 340 480 L 460 320" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
      <text x="400" y="392" text-anchor="middle" font-size="17" fill="#d8c0a4">requests</text>
    </g>

    <g>
      <path d="M 800 320 L 950 260" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="875" y="282" text-anchor="middle" font-size="17" fill="#d8c0a4">shares</text>
    </g>

    <g>
      <path d="M 1115 560 L 1100 302" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#inherit)"/>

    </g>

    <g>
      <path d="M 790 670 L 950 665" fill="none" stroke="#d8c0a4" stroke-width="2.4"  marker-end="url(#arrow)"/>
      <text x="870" y="659.5" text-anchor="middle" font-size="17" fill="#d8c0a4">uses</text>
    </g>

  </g>
  <text x="80" y="928" font-family="Nunito, Arial, sans-serif" font-size="18" fill="#d8c0a4">UML estructural generado para Lectura Lenta</text>
</svg>
