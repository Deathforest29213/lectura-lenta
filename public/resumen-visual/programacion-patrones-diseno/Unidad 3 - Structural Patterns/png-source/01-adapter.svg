  <text x="80" y="144" font-family="Nunito, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#d8c0a4">Structural pattern · incompatible interface</text>
  <g font-family="Nunito, Arial, sans-serif" filter="url(#shadow)">


    <g>
      <rect x="100" y="400" width="240" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="100" y="400" width="240" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="100" y1="442" x2="340" y2="442" stroke="#6689a1" stroke-width="2"/>

        <text x="220" y="424" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Client</text>


        <text x="118" y="470" font-size="19" fill="#d8c0a4">+ request()</text>

    </g>

    <g>
      <rect x="520" y="180" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="520" y="180" width="300" height="60" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="520" y1="240" x2="820" y2="240" stroke="#6689a1" stroke-width="2"/>

        <text x="670" y="204" text-anchor="middle" font-size="18" font-weight="700" fill="#fcdebe">&lt;&lt;interface&gt;&gt;</text>

        <text x="670" y="226" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Target</text>


        <text x="538" y="268" font-size="19" fill="#d8c0a4">+ request()</text>

    </g>

    <g>
      <rect x="520" y="590" width="300" height="110" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="520" y="590" width="300" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="520" y1="632" x2="820" y2="632" stroke="#6689a1" stroke-width="2"/>

        <text x="670" y="614" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Adapter</text>


        <text x="538" y="660" font-size="19" fill="#d8c0a4">- adaptee</text>

        <text x="538" y="684" font-size="19" fill="#d8c0a4">+ request()</text>

    </g>

    <g>
      <rect x="1040" y="590" width="300" height="92" rx="10" fill="#3e4a56" stroke="#6689a1" stroke-width="2"/>
      <rect x="1040" y="590" width="300" height="42" rx="10" fill="#465767" stroke="#6689a1" stroke-width="2"/>
      <line x1="1040" y1="632" x2="1340" y2="632" stroke="#6689a1" stroke-width="2"/>

        <text x="1190" y="614" text-anchor="middle" font-size="23" font-weight="900" fill="#fcdebe">Adaptee</text>


        <text x="1058" y="660" font-size="19" fill="#d8c0a4">+ specificRequest()</text>

    </g>

