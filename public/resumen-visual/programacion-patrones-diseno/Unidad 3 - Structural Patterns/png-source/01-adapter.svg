  <g font-family="Nunito, Arial, sans-serif">

    <g>
      <path d="M 340 440 L 520 260" fill="none" stroke="#d8c0a4" stroke-width="2.4" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
